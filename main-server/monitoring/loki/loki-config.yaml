---
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb        # Lo store moderno che citava la tua guida
      object_store: filesystem # Ma salvato localmente, non su S3
      schema: v13        # L'ultima versione dello schema
      index:
        prefix: index_
        period: 24h

