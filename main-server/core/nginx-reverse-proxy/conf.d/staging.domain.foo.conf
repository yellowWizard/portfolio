server {
	
	listen 8080;
	server_name staging.domain.foo www.staging.domain.foo;

	location / {
		return 301 https://$host$request_uri;
	}
}
	
server {

	listen 8443 ssl;
	server_name staging.domain.foo www.staging.domain.foo;

	ssl_certificate /etc/letsencrypt/live/domain.foo/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/domain.foo/privkey.pem;
	include /etc/nginx/ssl/options-ssl-nginx.conf;
	ssl_dhparam /etc/nginx/ssl/ssl-dhparams.pem;

	allow 10.13.13.0/24;
    	allow 127.0.0.1;
    	deny all;

	location / {
		
		auth_basic "Hey Hey Hey...";
		auth_basic_user_file /etc/nginx/.htpasswd;

		proxy_pass http://staging-nginx-astroalce:8080;
		proxy_http_version 1.1;
		
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-Proto $scheme;

		proxy_redirect off;
	}
	

	# Add Error Page (404-50x)
}
