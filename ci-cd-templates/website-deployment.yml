name: Deploy Hugo Site
on:
  push:
    branches:
      - main
      - staging

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Staging Website Hugo
        if: startsWith(github.ref, 'refs/heads/staging')
        run: hugo --baseURL "${{secrets.STAGING_URL}}" --minify

      - name: Build Production Website Hugo
        if: startsWith(github.ref, 'refs/heads/main')
        run: hugo --baseURL "${{secrets.PUBLIC_URL}}" --minify

      - name: Build Docker Image
        run: |
          docker build -t website:${{github.ref_name}} .

      - name: Deploy Container
        run: |
          if [ "${{ github.ref_name }}" == "staging" ]; then
            CONTAINER_NAME="${{ secrets.STAGING_CONTAINER }}"
          else
            CONTAINER_NAME="${{ secrets.PUBLIC_CONTAINER }}"
          fi
          
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --network reverse-proxy-net \
            --restart unless-stopped \
            website:${{ github.ref_name }}

